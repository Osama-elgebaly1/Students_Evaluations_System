{% extends "base.html" %}
{% block style %}
<style>
  .reset-password-container {
    max-width: 430px;
    margin: 48px auto 0 auto;
    background: #232946;
    border-radius: 18px;
    box-shadow: 0 8px 32px rgba(44,62,80,0.23);
    padding: 38px 32px 28px 32px;
    animation: fadeIn 0.8s;
  }
  .reset-password-container h2 {
    color: #6dd5fa;
    font-weight: bold;
    letter-spacing: 1px;
    margin-bottom: 28px;
    text-align: center;
  }
  .reset-password-container label {
    color: #eaeaea;
    font-weight: 500;
    margin-bottom: 6px;
  }
  .reset-password-container input[type="password"] {
    width: 100%;
    padding: 10px 12px;
    border-radius: 7px;
    border: 1.5px solid #6dd5fa;
    background: #16161a;
    color: #eaeaea;
    font-size: 1em;
    margin-bottom: 8px;
    transition: border 0.2s, box-shadow 0.2s;
    outline: none;
  }
  .reset-password-container input[type="password"]:focus {
    border: 1.5px solid #48c6ef;
    box-shadow: 0 0 0 2px #6dd5fa33;
  }
  .reset-password-container .btn-success {
    background: linear-gradient(90deg, #6dd5fa 0%, #2980b9 100%);
    color: #232946;
    border: none;
    border-radius: 7px;
    font-size: 1.08em;
    font-weight: 500;
    padding: 12px 0;
    box-shadow: 0 2px 8px rgba(44,62,80,0.18);
    transition: background 0.2s, color 0.2s, transform 0.1s;
    width: 100%;
    margin-top: 8px;
  }
  .reset-password-container .btn-success:hover {
    background: linear-gradient(90deg, #48c6ef 0%, #2471a3 100%);
    color: #fff;
    transform: translateY(-2px) scale(1.03);
  }
  .reset-password-container .invalid-feedback {
    color: #ff6b6b;
    font-size: 0.97em;
    margin: 4px 0 0 0;
  }
  @media (max-width: 600px) {
    .reset-password-container {
      padding: 18px 6vw 18px 6vw;
    }
  }
</style>
{% endblock style %}

{% block content %}
<div class="reset-password-container">
  <h2>Reset Admin Password</h2>
  <form method="POST" action="{% url "reset_password" %}" novalidate>
    {% csrf_token %}

    <div class="mb-3">
      <label for="id_password" class="form-label">New Password</label>
      <input type="password" name="password" class="{% if form.password.errors %}is-invalid{% endif %}" id="id_password">
      {% for error in form.password.errors %}
        <div class="invalid-feedback">{{ error }}</div>
      {% endfor %}
    </div>

    <div class="mb-3">
      <label for="id_confirm_password" class="form-label">Confirm Password</label>
      <input type="password" name="confirm_password" class="form-control" id="id_confirm_password">
    </div>

    <button type="submit" class="btn btn-success w-100">Reset</button>
  </form>
  </div>

{% endblock content %}
