<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Panel - Add Evaluation</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
  <div class="container mt-5">
    <h2 class="text-center">Admin Panel - Add Evaluation</h2>
    <form action="/submit_evaluation" method="post">
      <div class="mb-3">
        <label for="student_id" class="form-label">Student ID</label>
        <input type="text" class="form-control" id="student_id" name="student_id" required>
      </div>
      <div class="mb-3">
        <label for="grade" class="form-label">Grade</label>
        <input type="number" class="form-control" id="grade" name="grade" required>
      </div>
      <div class="mb-3">
        <label for="rating" class="form-label">Rating</label>
        <input type="text" class="form-control" id="rating" name="rating" required>
      </div>
      <div class="mb-3">
        <label for="month" class="form-label">Month</label>
        <input type="text" class="form-control" id="month" name="month" required>
      </div>
      <button type="submit" class="btn btn-success w-100">Submit Evaluation</button>
    </form>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
