<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Student Results</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
  <div class="container mt-5">
    <h2 class="text-center">Student Evaluation</h2>
    <div class="mb-3">
      <p><strong>Latest Evaluation:</strong></p>
      <p>Grade: 95 | Rating: A+</p>
      <p><strong>Month: April</strong></p>
    </div>
    <button class="btn btn-info w-100" id="show-previous">Show Previous Results</button>
    <div id="previous-results" class="mt-3" style="display:none;">
      <table class="table table-bordered">
        <thead>
          <tr>
            <th scope="col">Month</th>
            <th scope="col">Grade</th>
            <th scope="col">Rating</th>
          </tr>
        </thead>
        <tbody>
          <tr>
            <td>March</td>
            <td>90</td>
            <td>A</td>
          </tr>
          <tr>
            <td>February</td>
            <td>85</td>
            <td>B+</td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>

  <script>
    document.getElementById('show-previous').addEventListener('click', function() {
      document.getElementById('previous-results').style.display = 'block';
    });
  </script>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
